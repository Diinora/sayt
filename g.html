<!DOCTYPE html>
<html lang="kaa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dizimnen otiw</title>
<link rel="stylesheet" href="../static/g.css">
</head>
<body>

  <div class="page">

    <!-- Sol panel: brend / signature -->
    <aside class="brand-panel">
      <div class="brand-top">
        <span class="logo-mark">AR</span>
        <span class="logo-text">Kurs&nbsp;Hub</span>
      </div>

      <svg class="horizon" viewBox="0 0 600 300" preserveAspectRatio="none" aria-hidden="true">
        <path class="dune dune-1" d="M0,190 C120,140 200,230 320,180 C420,140 520,210 600,170 L600,300 L0,300 Z"></path>
        <path class="dune dune-2" d="M0,230 C140,190 240,250 360,210 C460,180 540,240 600,220 L600,300 L0,300 Z"></path>
        <path class="dune dune-3" d="M0,260 C160,235 260,275 400,250 C480,235 540,265 600,255 L600,300 L0,300 Z"></path>
      </svg>

      <div class="brand-copy">
        <p class="brand-eyebrow">Xosh keldiniz!</p>
        <h1 class="brand-title">Jańa saparınız.<br>usınnan baslaydı</h1>
        <p class="brand-text">Dizimnen ótip, óz panelińizge kiriń hám barlıq imkaniyatlardan paydalanıń.</p>
      </div>

      <p class="brand-foot">© 2026 Aral Register</p>
    </aside>

    <!-- Oñ panel: forma -->
    <main class="form-panel">
      <form class="reg-form" novalidate>

        
        <h2 class="form-title">Dizimnen ótiw</h2>
        <p class="form-sub">Esabıńız bar ma? <a href="#" class="link">Kiriw</a></p>

        <div class="field-row">
          <div class="field">
            <label for="fname">Atı</label>
            <input id="fname" name="fname" type="text" placeholder="Ati" required>
          </div>
          <div class="field">
            <label for="lname">Familiyasi</label>
            <input id="lname" name="lname" type="text" placeholder="Familiya" required>
          </div>
        </div>

        <div class="field">
          <label for="phone">Telefon nomeri</label>
          <input id="phone" name="phone" type="tel" placeholder="+998 __ ___ __ __" required>
        </div>

        <div class="field">
          <label for="pass1">Parol</label>
          <input id="pass1" name="pass1" type="password" placeholder="Kamida 8 belgi" required minlength="8">
        </div>

        <div class="field">
          <label for="pass2">Paroldi qaytalan</label>
          <input id="pass2" name="pass2" type="password" placeholder="Paroldi qayta kiritin" required minlength="8">
        </div>

        <label class="check-row">
          <input type="checkbox" required>
          <span>Меn <a href="#" class="link">paydalanıw shártleri</a> qabıl etemen</span>
        </label>

        <button type="submit" class="btn-submit">Dizimnen otiw</button>

        <div class="divider"><span>yamasa</span></div>

        <button type="button" class="btn-outline">Google arqalı dizimnen ótiw</button>

      </form>
    </main>

  </div>
<script>
  document.querySelector('.reg-form').addEventListener('submit', async function (e) {
    e.preventDefault();

    const fname = document.querySelector('#fname').value;
    const lname = document.querySelector('#lname').value;
    const phone = document.querySelector('#phone').value;

    try {
      await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ism: `${fname} ${lname}`, telefon: phone }),
      });
      alert("Raxmet! Magliwmatlariniz qabıl etildi.");
      this.reset();
    } catch (err) {
      alert("Qátelik júz berdi, qayta urınıp kóriń.");
    }
  });
  </script>
</body>
</html>
